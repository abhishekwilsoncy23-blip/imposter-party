<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Document Scanner</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script async src="https://docs.opencv.org/4.7.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
    
    <script src="https://cdn.jsdelivr.net/gh/ColonelParrot/jscanify@master/src/jscanify.min.js"></script>

    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            background: white; padding: 2rem; border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%; max-width: 500px; text-align: center;
        }
        .btn {
            background-color: var(--primary); color: white;
            padding: 12px 24px; border: none; border-radius: 0.5rem;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            width: 100%; margin-bottom: 10px; transition: opacity 0.2s;
        }
        .btn:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .btn-success { background-color: #059669; }
        
        #status { margin: 15px 0; font-weight: 500; color: #475569; }
        
        /* Gallery for scanned pages */
        .gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1));
            gap: 10px; margin-top: 20px;
        }
        .page-preview {
            width: 100px; height: 141px; object-fit: cover;
            border: 2px solid #e2e8f0; border-radius: 4px;
        }
        
        /* Hidden elements used for processing */
        #hidden-canvas, #camera-input { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Scanner Pro</h2>
    <div id="status">Loading Computer Vision Engine (OpenCV)... please wait.</div>

    <input type="file" accept="image/*" capture="environment" id="camera-input" disabled />

    <button id="capture-btn" class="btn" onclick="document.getElementById('camera-input').click()" disabled>
        📸 Scan Document
    </button>
    
    <button id="pdf-btn" class="btn btn-success" onclick="generatePDF()" style="display: none;">
        📄 Download PDF
    </button>

    <div class="gallery" id="gallery"></div>
</div>

<canvas id="hidden-canvas"></canvas>

<script>
    let scanner;
    let scannedPages = []; // Array to store base64 images of processed pages
    const statusEl = document.getElementById('status');
    const captureBtn = document.getElementById('capture-btn');
    const pdfBtn = document.getElementById('pdf-btn');
    const cameraInput = document.getElementById('camera-input');
    const gallery = document.getElementById('gallery');
    const hiddenCanvas = document.getElementById('hidden-canvas');
    const ctx = hiddenCanvas.getContext('2d');

    // 1. Initialize OpenCV and Jscanify
    function onOpenCvReady() {
        // Wait an extra second to ensure cv object is fully attached to window
        setTimeout(() => {
            scanner = new jscanify();
            statusEl.innerText = "Ready to scan! Engine loaded.";
            statusEl.style.color = "#059669";
            captureBtn.disabled = false;
            cameraInput.disabled = false;
        }, 1000);
    }

    // 2. Handle Photo Capture
    cameraInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        statusEl.innerText = "Processing document...";
        statusEl.style.color = "#d97706";
        
        const img = new Image();
        img.onload = function() {
            // Draw captured image to canvas (Scale down slightly if it's massive to prevent crashing)
            const MAX_WIDTH = 1500;
            let width = img.width;
            let height = img.height;
            
            if (width > MAX_WIDTH) {
                height = Math.round(height *= MAX_WIDTH / width);
                width = MAX_WIDTH;
            }

            hiddenCanvas.width = width;
            hiddenCanvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);

            processImage();
        };
        img.src = URL.createObjectURL(file);
    });

    // 3. Extract, Crop, and Filter
    function processImage() {
        try {
            // Auto-detect paper and warp perspective (extract)
            const extractedCanvas = scanner.extractPaper(hiddenCanvas, hiddenCanvas.width, hiddenCanvas.height);
            
            // Convert to base64 JPEG
            const base64Img = extractedCanvas.toDataURL('image/jpeg', 0.8);
            
            // Save to our array
            scannedPages.push(base64Img);
            
            // Update UI
            updateGallery(base64Img);
            statusEl.innerText = `Page ${scannedPages.length} scanned successfully!`;
            statusEl.style.color = "#059669";
            pdfBtn.style.display = 'block'; // Show PDF button

        } catch (error) {
            console.error(error);
            statusEl.innerText = "Could not detect document edges. Try against a contrasting background.";
            statusEl.style.color = "#dc2626";
        }
    }

    // 4. Update UI Preview
    function updateGallery(imgSrc) {
        const imgEl = document.createElement('img');
        imgEl.src = imgSrc;
        imgEl.className = 'page-preview';
        gallery.appendChild(imgEl);
    }

    // 5. Generate PDF using jsPDF
    function generatePDF() {
        statusEl.innerText = "Generating PDF...";
        
        // Initialize jsPDF (A4 size, portrait)
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();

        scannedPages.forEach((pageBase64, index) => {
            if (index > 0) doc.addPage();
            
            // Add image to PDF. Adjusting to fit A4 size.
            // In a production app, you'd calculate aspect ratio to prevent stretching.
            doc.addImage(pageBase64, 'JPEG', 0, 0, pageWidth, pageHeight);
        });

        doc.save('Scanned_Document.pdf');
        statusEl.innerText = "PDF Downloaded!";
    }
</script>

</body>
</html>
