<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Imposter Game</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .card { background: #222; border: 2px solid #444; border-radius: 15px; padding: 40px; margin: 20px auto; max-width: 300px; cursor: pointer; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #word-display { font-size: 24px; font-weight: bold; color: #ffeb3b; display: none; }
    </style>
</head>
<body>
    <h1>Who is the Imposter?</h1>
    <div id="setup">
        <input type="number" id="playerCount" value="4" min="3"> Players<br><br>
        <button onclick="startGame()">Start New Game</button>
    </div>

    <div id="game-area" style="display:none;">
        <h2 id="player-turn">Player 1's Turn</h2>
        <div class="card" onclick="toggleWord()">
            <div id="tap-instruction">TAP TO REVEAL</div>
            <div id="word-display">SECRET WORD</div>
        </div>
        <button id="next-btn" onclick="nextPlayer()">Next Player</button>
    </div>

    <script>
        let words = [];
        let gameData = { players: [], currentPlayer: 0, secretWord: "" };

        // Fetch 10,000 common words from a public JS library/CDN
        fetch('https://raw.githubusercontent.com')
            .then(res => res.text())
            .then(data => {
                words = data.split('\n').filter(w => w.length > 3);
                console.log("Words loaded!");
            });

        function startGame() {
            const count = document.getElementById('playerCount').value;
            const imposterIndex = Math.floor(Math.random() * count);
            const secretWord = words[Math.floor(Math.random() * words.length)].toUpperCase();
            
            gameData = {
                players: Array.from({length: count}, (_, i) => i === imposterIndex),
                currentPlayer: 0,
                secretWord: secretWord
            };

            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            updateUI();
        }

        function toggleWord() {
            const display = document.getElementById('word-display');
            const instruction = document.getElementById('tap-instruction');
            const isImposter = gameData.players[gameData.currentPlayer];

            if (display.style.display === 'none') {
                display.innerText = isImposter ? "YOU ARE THE IMPOSTER" : gameData.secretWord;
                display.style.display = 'block';
                instruction.style.display = 'none';
            } else {
                display.style.display = 'none';
                instruction.style.display = 'block';
            }
        }

        function nextPlayer() {
            gameData.currentPlayer++;
            if (gameData.currentPlayer >= gameData.players.length) {
                alert("All players have seen their roles! Start discussing.");
                location.reload(); 
            } else {
                document.getElementById('word-display').style.display = 'none';
                document.getElementById('tap-instruction').style.display = 'block';
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('player-turn').innerText = `Player ${gameData.currentPlayer + 1}'s Turn`;
        }
    </script>
</body>
</html>
