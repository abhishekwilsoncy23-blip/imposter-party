<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕵️ Imposter Party!</title>
    <style>
        :root { --primary: #FFD700; --secondary: #FF4757; --bg: #2F3542; --accent: #2ED573; }
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: var(--bg); color: white; text-align: center; padding: 20px; }
        
        .container { max-width: 450px; margin: auto; background: #3E4451; padding: 30px; border-radius: 30px; border: 8px solid #1E2124; box-shadow: 10px 10px 0px #000; }
        
        h1 { font-size: 3rem; color: var(--primary); text-shadow: 4px 4px 0px #000; margin-bottom: 10px; }
        
        input { padding: 15px; border-radius: 15px; border: 4px solid var(--primary); width: 80%; font-size: 18px; margin-bottom: 10px; outline: none; }
        
        button { padding: 15px 25px; cursor: pointer; background: var(--secondary); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; box-shadow: 0 6px 0 #b33939; transition: 0.1s; margin: 10px; }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #b33939; }
        button:disabled { background: #747d8c; box-shadow: 0 6px 0 #2f3542; }

        .card { background: #57606f; border: 6px dashed var(--primary); border-radius: 25px; padding: 60px 20px; margin: 20px auto; cursor: pointer; animation: float 3s ease-in-out infinite; }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #word-display { font-size: 32px; font-weight: bold; color: var(--accent); display: none; text-shadow: 2px 2px 0 #000; }
        
        #timer { font-size: 80px; color: var(--secondary); text-shadow: 5px 5px 0px #000; margin: 10px; font-weight: 900; }
        
        .speaker-box { background: var(--primary); color: #000; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 22px; margin-bottom: 20px; border: 4px solid #000; }
        
        .player-chip { display: inline-block; background: #747d8c; padding: 5px 15px; border-radius: 20px; margin: 5px; border: 2px solid #000; }
    </style>
</head>
<body>

<div class="container">
    <h1>IMPOSTER</h1>
    <p id="status">Wait... sharpening pencils...</p>

    <!-- STEP 1 -->
    <div id="setup-screen">
        <div id="name-list" style="margin-bottom: 20px;"></div>
        <input type="text" id="nameInput" placeholder="Player Name...">
        <button onclick="addPlayer()">ADD +</button>
        <br><br>
        <button id="startBtn" onclick="startGame()" disabled>LOADING WORDS...</button>
    </div>

    <!-- STEP 2 -->
    <div id="reveal-screen" style="display:none;">
        <h2 id="turn-name" style="color:var(--primary)"></h2>
        <div class="card" onclick="toggleSecret()">
            <div id="tap-msg">Tap to see your secret!</div>
            <div id="word-display">WORD</div>
        </div>
        <button onclick="nextPlayer()">I'M READY! NEXT Player →</button>
    </div>

    <!-- STEP 3 -->
    <div id="game-screen" style="display:none;">
        <div class="speaker-box">📢 First Speaker: <span id="first-speaker">?</span></div>
        <div id="timer">60</div>
        <p>Find the Imposter before time runs out!</p>
        <button onclick="revealImposter()" style="background: var(--accent); box-shadow: 0 6px 0 #218c74;">REVEAL NOW!</button>
    </div>

    <!-- STEP 4 -->
    <div id="final-screen" style="display:none;">
        <h2 id="winner-msg"></h2>
        <button onclick="location.reload()">PLAY AGAIN 🔄</button>
    </div>
</div>

<script>
    let players = [];
    let wordList = [];
    let gameState = { imposter: "", word: "", index: 0 };

    // Fetching words via reliable CDN (English nouns/common words)
    fetch('https://cdn.jsdelivr.net')
        .then(r => r.json())
        .then(data => {
            wordList = data.filter(w => w.length > 4 && w.length < 9);
            document.getElementById('status').innerText = "✅ Ready for Fun!";
            let btn = document.getElementById('startBtn');
            btn.disabled = false;
            btn.innerText = "START PARTY! 🎉";
        })
        .catch(() => {
            wordList = ["PIZZA", "ROCKET", "DRAGON", "BANANA", "ZOMBIE", "GUITAR"];
            document.getElementById('status').innerText = "Offline Mode Active";
        });

    function addPlayer() {
        let input = document.getElementById('nameInput');
        if(input.value.trim()){
            players.push(input.value.trim());
            let chip = document.createElement('span');
            chip.className = 'player-chip';
            chip.innerText = input.value.trim();
            document.getElementById('name-list').appendChild(chip);
            input.value = "";
        }
    }

    function startGame() {
        if(players.length < 3) return alert("You need at least 3 friends to play!");
        
        gameState.imposter = players[Math.floor(Math.random() * players.length)];
        gameState.word = wordList[Math.floor(Math.random() * wordList.length)].toUpperCase();
        gameState.index = 0;

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('reveal-screen').style.display = 'block';
        updateTurn();
    }

    function updateTurn() {
        document.getElementById('turn-name').innerText = "HEY " + players[gameState.index].toUpperCase() + "!";
        document.getElementById('word-display').style.display = 'none';
        document.getElementById('tap-msg').style.display = 'block';
    }

    function toggleSecret() {
        let display = document.getElementById('word-display');
        let msg = document.getElementById('tap-msg');
        let isImposter = players[gameState.index] === gameState.imposter;

        if(display.style.display === 'none'){
            display.innerText = isImposter ? "🕵️ YOU ARE THE IMPOSTER!" : "WORD: " + gameState.word;
            display.style.display = 'block';
            msg.style.display = 'none';
        } else {
            display.style.display = 'none';
            msg.style.display = 'block';
        }
    }

    function nextPlayer() {
        gameState.index++;
        if(gameState.index >= players.length) {
            startDiscussion();
        } else {
            updateTurn();
        }
    }

    function startDiscussion() {
        document.getElementById('reveal-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        // Randomly pick the first speaker
        document.getElementById('first-speaker').innerText = players[Math.floor(Math.random() * players.length)];
        
        let timeLeft = 60;
        let t = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(t);
                revealImposter();
            }
        }, 1000);
    }

    function revealImposter() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('final-screen').style.display = 'block';
        document.getElementById('winner-msg').innerHTML = 
            `<div style="font-size:24px">THE SCARY IMPOSTER WAS:</div>` + 
            `<div style="font-size:50px; color:var(--primary); margin:20px;">${gameState.imposter}</div>` +
            `<div style="font-size:20px">SECRET WORD: ${gameState.word}</div>`;
    }
</script>

</body>
</html>
