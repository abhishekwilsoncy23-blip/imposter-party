<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max-Res Native Capture</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg);
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        #preview {
            width: 100%;
            height: auto;
            border-radius: 0.5rem;
            margin-top: 1rem;
            display: none;
            border: 2px solid #e2e8f0;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .btn:active { transform: scale(0.98); }
        .info {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #64748b;
        }
        #status { color: #059669; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Native Camera Pro</h2>
    <p>Captures at full sensor resolution</p>
    
    <input 
        type="file" 
        accept="image/*" 
        capture="environment" 
        id="camera-input" 
        hidden 
    />

    <button class="btn" onclick="document.getElementById('camera-input').click()">
        Open Native Camera
    </button>

    <div id="status"></div>
    <img id="preview" alt="High-res preview">
    
    <div class="info" id="file-meta"></div>
</div>

<script>
    const input = document.getElementById('camera-input');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');
    const meta = document.getElementById('file-meta');

    input.addEventListener('change', function(e) {
        const file = e.target.files[0];
        
        if (file) {
            // 1. Show processing status
            status.innerText = "Photo Captured!";
            
            // 2. Calculate and show the REAL quality/size
            const sizeInMB = (file.size / (1024 * 1024)).toFixed(2);
            meta.innerHTML = `
                <strong>Clarity:</strong> Full Native Resolution<br>
                <strong>File Size:</strong> ${sizeInMB} MB<br>
                <strong>Type:</strong> ${file.type}
            `;

            // 3. Create a preview URL (High quality)
            const url = URL.createObjectURL(file);
            preview.src = url;
            preview.style.display = 'block';

            // 4. MOCK UPLOAD: How to send the raw binary without losing pixels
            uploadFile(file);
        }
    });

    async function uploadFile(file) {
        status.innerText = "Uploading raw pixels...";
        
        const formData = new FormData();
        formData.append('high_res_photo', file);

        try {
            // Replace '/upload' with your actual server endpoint
            // const response = await fetch('/upload', { method: 'POST', body: formData });
            
            setTimeout(() => {
                status.innerText = "Upload Complete (Max Clarity Preserved)";
            }, 1500);
            
        } catch (err) {
            status.innerText = "Upload failed, but photo is saved locally.";
        }
    }
</script>

</body>
</html>
